site_name: playwright-drupal
site_url: https://lullabot.github.io/playwright-drupal/
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/palette-sync.js

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - admonition
  - attr_list
  - md_in_html

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started:
    - About playwright-drupal: getting-started/index.md
    - Installation: getting-started/installation.md
    - Playwright Configuration: getting-started/playwright-configuration.md
  - Guides:
    - Writing Tests: guides/writing-tests.md
    - Debugging Tests: guides/debugging-tests.md
    - Drupal Utilities: guides/utilities.md
    - Visual Comparisons: guides/visual-comparisons.md
    - GitHub Actions: guides/github-actions.md
  - Development:
    - Contributing: development/contributing.md
    - Releases: development/releases.md
