site_name: playwright-drupal
site_url: https://lullabot.github.io/playwright-drupal/
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: mkdocs-overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/palette-sync.js

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets
  - admonition
  - attr_list
  - md_in_html

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started:
    - About playwright-drupal: getting-started/index.md
    - Installation: getting-started/installation.md
    - Playwright Configuration: getting-started/playwright-configuration.md
  - Working with Tests:
    - Writing Tests: working-with-tests/writing-tests.md
    - Visual Comparisons (Diffs): working-with-tests/visual-comparisons.md
    - Accessibility Tests: working-with-tests/accessibility-tests.md
    - Debugging Tests: working-with-tests/debugging-tests.md
    - Drupal Testing Utilities: working-with-tests/drupal-testing-utilities.md
  - Contributing:
    - Development: contributing/development.md
    - Releases: contributing/releases.md
