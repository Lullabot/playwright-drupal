name: Test

on:
  pull_request:
  workflow_call:

jobs:
  unit-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        typescript-version: ['5', '6']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install TypeScript ${{ matrix.typescript-version }}
        run: npm install --no-save typescript@${{ matrix.typescript-version }}

      - name: Run unit tests
        run: npm run test:unit

  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        typescript-version: ['5', '6']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install TypeScript ${{ matrix.typescript-version }}
        run: npm install --no-save typescript@${{ matrix.typescript-version }}

      - name: Pack
        run: npm pack

      - name: Upload tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-drupal-tarball-ts${{ matrix.typescript-version }}
          path: lullabot-playwright-drupal-*.tgz
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        suite:
          - integration
          - integration-docroot
          - integration-mysql-to-sqlite
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Install DDEV
        uses: ddev/github-action-setup-ddev@fdf2f5c97943bae638f31df6df86f1defa6210c0 # v1
        with:
          autostart: false

      - name: Download tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: playwright-drupal-tarball-ts6

      - name: Set tarball path
        run: echo "PLAYWRIGHT_DRUPAL_TARBALL=$(ls "$GITHUB_WORKSPACE"/lullabot-playwright-drupal-*.tgz)" >> "$GITHUB_ENV"

      - name: Run integration tests
        run: bats test/${{ matrix.suite }}.bats

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-${{ matrix.suite }}
          path: /tmp/pwtest-*/test/playwright/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Accessibility summary
        if: always()
        run: |
          npm install && npm run build
          # Prefer the a11y-specific report preserved outside test-results/.
          REPORT=$(find tmp/ -path "*/test/playwright/a11y-results.json" 2>/dev/null | head -1)
          # Fall back to the generic report.
          REPORT=${REPORT:-$(find tmp/ -path "*/test/playwright/test-results/results.json" 2>/dev/null | head -1)}
          if [ -n "$REPORT" ]; then
            node lib/github/a11y-summary.js --mode=summary --report-path="$REPORT"
            node lib/github/a11y-summary.js --mode=annotations --report-path="$REPORT"
          else
            echo "No JSON report found — skipping a11y summary."
          fi

