name: Rebase

on:
  repository_dispatch:
    types: [rebase-command]

jobs:
  rebase:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.REBASE_APP_ID }}
          private-key: ${{ secrets.REBASE_PRIVATE_KEY }}
      - name: Rebase PR branch
        id: rebase
        uses: deviantintegral/rebase@4c5e8bb96b668b14db1a19af1c3931e9a41879e0 # copilot/add-incremental-push-feature
        with:
          token: ${{ steps.app-token.outputs.token }}
          head: ${{ github.event.client_payload.pull_request.head.label }}
          rebase-options: '--no-keep-empty'
          incremental-push: true
      - name: Add reaction
        if: steps.rebase.outputs.rebased-count == 1
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
          reactions: hooray
