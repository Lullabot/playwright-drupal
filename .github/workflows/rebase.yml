name: Rebase

on:
  repository_dispatch:
    types: [rebase-command]

jobs:
  rebase:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        id: app-token
        with:
          app-id: ${{ vars.REBASE_APP_ID }}
          private-key: ${{ secrets.REBASE_PRIVATE_KEY }}
      - name: Rebase PR branch
        id: rebase
        uses: deviantintegral/rebase@integration/pr-1-and-2
        with:
          token: ${{ steps.app-token.outputs.token }}
          head: ${{ github.event.client_payload.pull_request.head.label }}
          rebase-options: '--no-keep-empty'
          incremental-push: true
          drop-empty-commits: true
      - name: Add reaction
        if: steps.rebase.outputs.rebased-count == 1
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
          reactions: hooray
