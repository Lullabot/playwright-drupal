name: Deploy Docs

on:
  push:
    branches:
      - main
    tags:
      - 'playwright-drupal-*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/playwright-drupal-')
        run: |
          VERSION="${GITHUB_REF_NAME#playwright-drupal-}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Deploy release docs with mike
        if: startsWith(github.ref, 'refs/tags/playwright-drupal-')
        run: uvx --with-requirements docs/requirements.txt mike@2.2.0 deploy --push --update-aliases ${{ steps.version.outputs.version }} latest

      - name: Set default version
        if: startsWith(github.ref, 'refs/tags/playwright-drupal-')
        run: uvx --with-requirements docs/requirements.txt mike@2.2.0 set-default --push latest

      - name: Deploy main docs with mike
        if: github.ref == 'refs/heads/main'
        run: uvx --with-requirements docs/requirements.txt mike@2.2.0 deploy --push main
