name: Deploy Docs

on:
  push:
    tags:
      - 'playwright-drupal-*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#playwright-drupal-}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Deploy docs with mike
        run: uvx --with-requirements docs/requirements.txt mike@2.1.3 deploy --push --update-aliases ${{ steps.version.outputs.version }} latest

      - name: Set default version
        run: uvx --with-requirements docs/requirements.txt mike@2.1.3 set-default --push latest
