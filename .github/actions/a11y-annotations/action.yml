name: 'Accessibility Annotations'
description: 'Surface accessibility violations in GitHub workflow summaries and inline annotations'

inputs:
  report-path:
    description: 'Path to Playwright JSON report'
    required: false
    default: 'test-results/results.json'
  mode:
    description: 'Output mode: all, summary, or annotations'
    required: false
    default: 'all'

runs:
  using: 'composite'
  steps:
    # Inputs are bound via env to prevent shell injection — see
    # https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
    - name: Accessibility summary
      if: ${{ inputs.mode == 'all' || inputs.mode == 'summary' }}
      shell: bash
      env:
        REPORT_PATH: ${{ inputs.report-path }}
      run: ddev exec npx playwright-drupal-a11y-summary --mode=summary --report-path="$REPORT_PATH"

    - name: Accessibility annotations
      if: ${{ inputs.mode == 'all' || inputs.mode == 'annotations' }}
      shell: bash
      env:
        REPORT_PATH: ${{ inputs.report-path }}
      run: ddev exec npx playwright-drupal-a11y-summary --mode=annotations --report-path="$REPORT_PATH"
